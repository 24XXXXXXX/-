# Tomcat
server:
    tomcat:
        uri-encoding: UTF-8
    port: 808
    servlet:
        context-path: /

spring:
    config:
        import: optional:file:.env[.properties] 
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3307/communitySport?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        username: root
        password: '@JJ193495.x'
        druid:
          initial-size: 5
          min-idle: 5
          max-active: 30
          max-wait: 60000
          time-between-eviction-runs-millis: 60000
          min-evictable-idle-time-millis: 300000
          validation-query: SELECT 1
          test-while-idle: true
          test-on-borrow: false
          test-on-return: false

    data:
      redis:
        host: localhost
        port: 6379
        password: '@JJ193495.x'
        database: 0

    mail:
        host: ${MAIL_HOST:smtp.qq.com}
        port: ${MAIL_PORT:587}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        default-encoding: UTF-8
        properties:
          mail:
            smtp:
              auth: true
              ssl:
                trust: ${MAIL_HOST:smtp.qq.com}
              starttls:
                enable: true
                required: true
              connectiontimeout: 5000
              timeout: 5000
              writetimeout: 5000

#        driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
#        url: jdbc:sqlserver://127.0.0.1:1433;DatabaseName=springboot3cprm
#        username: sa
#        password: 123456

    servlet:
      multipart:
        max-file-size: 300MB
        max-request-size: 300MB
    resources:
      static-locations: classpath:static/,file:static/,file:src/main/resources/static/

#mybatis
mybatis-plus:
  mapper-locations: classpath*:/mapper-new/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.communitysport
  global-config:
    db-config:
      logic-delete-value: -1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    #springboot 项目mybatis plus 设置 jdbcTypeForNull (oracle数据库需配置JdbcType.NULL, 默认是Other)
    jdbc-type-for-null: 'null' 

app:
  jwt:
    secret: CHANGE_ME_32+_CHARS_SECRET_KEY_FOR_JWT_SIGNING
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 7
